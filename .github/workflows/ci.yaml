name: CI

on:
  push:
    branches:
      - main
      - preview
      - dev
jobs:
  lint:
    timeout-minutes: 5
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Test against linters
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit

  test:
    timeout-minutes: 20
    name: Test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - name: Install Git LFS
        run: |
          apt-get update
          apt-get install -y git-lfs
          git lfs install

      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Verify Playwright image version matches package.json
        run: |
          EXPECTED=$(node -p "require('./package.json').devDependencies['@playwright/test']")
          ACTUAL="1.58.2"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Playwright version mismatch! package.json has v$EXPECTED but CI uses v$ACTUAL. Update the container image in this workflow."
            exit 1
          fi

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build
        env:
          SITE_URL: http://localhost:4321
          TESTING: 'true'

      - name: Run Playwright e2e tests
        run: pnpm exec playwright test tests/e2e
        env:
          SITE_URL: http://localhost:4321
          CI: 'true'

      - name: Run Playwright visual tests
        run: pnpm exec playwright test tests/visual
        env:
          SITE_URL: http://localhost:4321
          CI: 'true'

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy
    needs: [lint, test]
    if: github.ref_name == 'main' || github.ref_name == 'preview' || github.ref_name == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          SITE_URL: https://drimchansky.dev
          IS_PRODUCTION: ${{ github.ref_name == 'main' && '1' || '' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=drimchansky-dev --branch=${{ github.ref_name }}
